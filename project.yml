name: IronLog

options:
  bundleIdPrefix: com.ironlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
  xcodeVersion: "15.4"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_PREVIEWS: "YES"
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

targets:
  IronLog:
    type: application
    platform: iOS
    deploymentTarget: "17.0"

    sources:
      - path: IronLog
        excludes:
          - "**/*.md"
          - "**/*.txt"

    resources:
      - path: IronLog/Assets.xcassets

    info:
      path: IronLog/Info.plist
      properties:
        CFBundleDisplayName: IronLog
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen:
          UIColorName: "LaunchBackground"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIUserInterfaceStyle: Dark
        NSUserNotificationsUsageDescription: "IronLog sends a reminder when you miss a scheduled training day."
        NSHealthUpdateUsageDescription: "IronLog saves your completed workouts to Apple Health so they appear in the Fitness app and count toward your Activity rings."
        NSHealthShareUsageDescription: "IronLog reads health data to help personalize your training."
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}

    entitlements:
      path: IronLog/IronLog.entitlements

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ironlog.app
        INFOPLIST_FILE: IronLog/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_HARDENED_RUNTIME: "YES"
