workflows:

  # ─────────────────────────────────────────────────────────────────────────────
  # TestFlight Distribution
  # Requires: Apple Developer account + App Store Connect API key set up in
  # Codemagic UI (Teams → Integrations → App Store Connect).
  # ─────────────────────────────────────────────────────────────────────────────
  ios-testflight:
    name: iOS — TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic  # Must match the name in Codemagic UI

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.ironlog.app
      xcode: 15.4
      vars:
        BUNDLE_ID: com.ironlog.app
        XCODE_SCHEME: IronLog

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen

      - name: Generate Xcode project
        script: xcodegen generate

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/IronLog.xcodeproj" \
            --scheme "$XCODE_SCHEME" \
            --config Release

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        cancel_previous_submissions: true
      email:
        recipients:
          - $CM_COMMIT_AUTHOR_EMAIL
        notify:
          success: true
          failure: true

  # ─────────────────────────────────────────────────────────────────────────────
  # Sideload Build — No Apple Developer account needed
  #
  # Produces an unsigned IPA you can install on your own iPhone using Sideloadly
  # (free Windows/Mac app). Apps signed this way expire every 7 days and need
  # a quick re-sign via Sideloadly.
  #
  # Steps after this build:
  #   1. Download IronLog.ipa from the Codemagic artifacts
  #   2. Install Sideloadly from sideloadly.io (free, Windows)
  #   3. Connect iPhone via USB, drag the IPA into Sideloadly, click Start
  #   4. On iPhone: Settings → General → VPN & Device Management → trust your Apple ID
  # ─────────────────────────────────────────────────────────────────────────────
  ios-sideload:
    name: iOS — Sideload IPA (no developer account)
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      xcode: 15.4
      vars:
        XCODE_SCHEME: IronLog

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen

      - name: Generate Xcode project
        script: xcodegen generate

      - name: Archive (unsigned)
        script: |
          xcodebuild \
            -project IronLog.xcodeproj \
            -scheme "$XCODE_SCHEME" \
            -destination "generic/platform=iOS" \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/IronLog.xcarchive" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - name: Package into IPA
        script: |
          mkdir -p "$CM_BUILD_DIR/Payload"
          cp -r "$CM_BUILD_DIR/IronLog.xcarchive/Products/Applications/IronLog.app" \
            "$CM_BUILD_DIR/Payload/IronLog.app"
          cd "$CM_BUILD_DIR"
          zip -r IronLog.ipa Payload
          echo "IPA created at $CM_BUILD_DIR/IronLog.ipa"

    artifacts:
      - $CM_BUILD_DIR/IronLog.ipa
      - /tmp/xcodebuild_logs/*.log
